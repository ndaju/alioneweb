# Dovecot Quota Configuration
# Deploy to VPS: copy to ~/alioneweb/docker-mailserver/config/
# Then restart: docker compose restart mailserver

# Enable quota plugin
mail_plugins = $mail_plugins quota
mail_attribute_dict = file:%U/Maildir/dovecot-uidmap

# Quota rules
quota_rule = *:storage=5GB
quota_rule2 = Trash:storage=+100M
quota_status_success = 200
quota_status_nouser = 0
quota_status_disabled = 0

# Quota warning at 80%
quota_warning = storage=80%% quota-warning 80 %u
quota_warning2 = storage=90%% quota-warning 90 %u
quota_warning3 = storage=95%% quota-warning 95 %u

# Quota enforcement
quota_enforce = yes
quota_enforce_user = yes
